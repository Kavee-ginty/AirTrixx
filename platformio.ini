[platformio]
default_envs = camdock_s3

[env]
platform = platformio/espressif32
framework = arduino
monitor_speed = 115200

[env:wristband_c3]
board = esp32-c3-devkitm-1
upload_port = COM20
monitor_port = COM20
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
build_src_filter =
    +<wristband/>
lib_deps =

[env:camdock_s3]
board = esp32-s3-devkitc-1
upload_port = COM10
monitor_port = COM10
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
build_src_filter =
    +<camdock/>
lib_deps =
    adafruit/Adafruit PWM Servo Driver Library
    pololu/VL53L1X